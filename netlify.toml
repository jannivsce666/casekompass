[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  included_files = ["downloads/pflegegrad-beantragen-einfach-vorbereitet.pdf"]

[[redirects]]
  from = "/api/contact"
  to = "/.netlify/functions/contact"
  status = 200

[[redirects]]
  from = "/api/chatbot"
  to = "/.netlify/functions/chatbot"
  status = 200

[[redirects]]
  from = "/api/shop/create-checkout"
  to = "/.netlify/functions/shop-create-checkout"
  status = 200

[[redirects]]
  from = "/api/shop/payment-status"
  to = "/.netlify/functions/shop-payment-status"
  status = 200

[[redirects]]
  from = "/api/shop/download"
  to = "/.netlify/functions/shop-download"
  status = 200

[[redirects]]
  from = "/api/shop/webhook"
  to = "/.netlify/functions/shop-webhook"
  status = 200

[[redirects]]
  from = "/downloads/pflegegrad-beantragen-einfach-vorbereitet.pdf"
  to = "/shop-ratgeber.html"
  status = 302
  force = true
